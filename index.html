<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>GrinderBank — gestão de banca e stats de poker</title>
<meta name="theme-color" content="#4C3E92" />

<!-- PWA: na tela inicial vira o app "PoolGG", abrindo em tela cheia -->
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" href="favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="GrinderBank" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />

<script src="config.js"></script>

<!-- libs HOSPEDADAS NO PRÓPRIO DOMÍNIO (vendor/): sem unpkg, sem ponto único de falha
     externo nem risco de supply-chain (um pacote comprometido na CDN roubaria a sessão
     de todos). Versões congeladas: react 18.3.1, react-dom 18.3.1, @babel/standalone
     7.26.4, @supabase/supabase-js 2.47.10 (bundle único), fflate 0.8.2. -->
<script src="vendor/react.production.min.js"></script>
<script src="vendor/react-dom.production.min.js"></script>
<script src="vendor/supabase.js"></script>
<script src="vendor/fflate.js"></script><!-- lê os ZIPs de hand history -->


<style>
  /* Tipografia profissional de produto financeiro: Inter no corpo/UI (números tabulares,
     legibilidade em tela pequena) + Space Grotesk nos títulos e números grandes. */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap');
  :root{
    --bg:#F5F0E6; --surface:#fff; --warm:#FCFAF3; --ink:#19231D; --inkSoft:#57645A;
    --green:#16513F; --greenMid:#1F7355; --greenSoft:#E5EDE6; --gold:#A5782C;
    --goldSoft:#F1E6CD; --red:#AE472E; --redSoft:#F5E3DC; --border:#E7DFCC;
    --plum:#4C3E92; --plumSoft:#EAE7F8;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  /* tabular-nums: todo dígito com a mesma largura — dinheiro e stats alinham em coluna */
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums}
  input,select,button,textarea{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums}
  select{-webkit-appearance:none;appearance:none}
  .ftfade{animation:ftf .5s cubic-bezier(.2,.7,.3,1) both}
  @keyframes ftf{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#D8CFBC;border-radius:8px}
  .wrap{display:flex;max-width:1280px;margin:0 auto;min-height:100vh}
  .side{display:none}
  .bottomnav{display:flex}
  .grid2{display:grid;grid-template-columns:1fr;gap:14px}
  .modalgrid{display:grid;grid-template-columns:1fr;gap:14px}
  .full{grid-column:1/-1}
  .spin{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--plum);border-radius:50%;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  @media(min-width:520px){ .modalgrid{grid-template-columns:1fr 1fr} }
  @media(min-width:860px){
    .side{display:flex}
    .bottomnav{display:none}
    .grid2{grid-template-columns:1fr 1fr}
    main{padding-bottom:30px !important}
    .mobile-only{display:none !important}
  }
  /* relatórios: na impressão só o relatório aparece (Imprimir -> Salvar como PDF) */
  @media print{
    body{background:#fff}
    body *{visibility:hidden}
    .printrep,.printrep *{visibility:visible}
    .printrep{position:absolute !important;inset:0 !important;overflow:visible !important}
    .noprint{display:none !important}
  }
  .repcard{break-inside:avoid;page-break-inside:avoid}
  .reptable{width:100%;border-collapse:collapse;font-size:12px}
  .reptable th{text-align:left;padding:7px 8px;background:#F2EEE3;font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;color:#6B6455}
  .reptable td{padding:7px 8px;border-bottom:1px solid #E7E1D2}
</style>
</head>
<body>
<div id="root"></div>

<script src="app.js"></script>
</body>
</html>
